- id: "1454"
  articulo: "1454"
  titulo: "Arras o señal en la compraventa"
  texto: >-
    Si hubiesen mediado arras o señal en el contrato de compra y venta, podrá
    rescindirse el contrato allanándose el comprador a perderlas, o el vendedor a
    devolverlas duplicadas.
- id: "1152"
  articulo: "1152"
  titulo: "Cláusula penal"
  texto: >-
    En las obligaciones con cláusula penal, la pena sustituirá a la indemnización
    de daños y al abono de intereses en caso de falta de cumplimiento, si otra cosa
    no se hubiere pactado. Sólo podrá hacerse efectiva la pena cuando ésta fuere
    exigible conforme a las disposiciones del presente Código.
- id: "1153"
  articulo: "1153"
  titulo: "Cláusula penal: cumplimiento y pena"
  texto: >-
    El deudor no podrá eximirse de cumplir la obligación pagando la pena, sino en el
    caso de que expresamente le hubiese sido reservado este derecho. Tampoco el
    acreedor podrá exigir conjuntamente el cumplimiento de la obligación y la
    satisfacción de la pena, sin que esta facultad le haya sido claramente otorgada.
- id: "1124"
  articulo: "1124"
  titulo: "Resolución de obligaciones recíprocas"
  texto: >-
    La facultad de resolver las obligaciones se entiende implícita en las recíprocas,
    para el caso de que uno de los obligados no cumpliere lo que le incumbe. El
    perjudicado podrá escoger entre exigir el cumplimiento o la resolución de la
    obligación, con el resarcimiento de daños y abono de intereses en ambos casos.
